<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutXplorer</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="page">

    <header class="hero">
      <h1 class="hero-title">FutXplorer</h1>
      <p class="hero-sub">Search any football player and explore their stats</p>

      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="e.g. Ronaldo, Messi, Mbappe..." autocomplete="off"/>
        <button id="searchBtn">Search</button>
      </div>
    </header>

    <div id="loader" class="loader hidden">
      <div class="loader-ring"></div>
      <span>Fetching player data...</span>
    </div>

    <div id="errorBox" class="error-box hidden"></div>

    <div id="controls" class="controls hidden">
      <div class="filter-group">
        <select id="posFilter">
          <option value="">All Positions</option>
          <option value="Forward">Forward</option>
          <option value="Midfielder">Midfielder</option>
          <option value="Defender">Defender</option>
          <option value="Goalkeeper">Goalkeeper</option>
        </select>
        <select id="leagueFilter">
          <option value="">All Leagues</option>
        </select>
        <select id="natFilter">
          <option value="">All Nationalities</option>
        </select>
      </div>
      <div class="sort-group">
        <select id="sortBy">
          <option value="rating">Sort by Rating</option>
          <option value="goals">Sort by Goals</option>
          <option value="assists">Sort by Assists</option>
          <option value="appearences">Sort by Matches</option>
        </select>
      </div>
    </div>

    <section id="resultsSection" class="results hidden"></section>

    <div id="emptyBox" class="empty hidden">
      <div class="empty-icon">🔍</div>
      <p>No players found for that search.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
